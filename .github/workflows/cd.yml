name: CD

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  # ── Checks (main branch only) ──────────────────────────────────────────────

  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dev deps
        run: pip install -e ".[dev]"

      - name: ruff check
        run: ruff check .

      - name: mypy
        run: mypy src/

  test-sqlite:
    name: Test (SQLite)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dev deps
        run: pip install -e ".[dev]"

      - name: pytest
        run: pytest -q

  test-postgres:
    name: Test (Postgres)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: mesadigital
          POSTGRES_PASSWORD: test
          POSTGRES_DB: mesadigital_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql+psycopg2://mesadigital:test@localhost:5432/mesadigital_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dev deps
        run: pip install -e ".[dev]"

      - name: pytest
        run: pytest -q

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter diner-app typecheck && pnpm --filter ops-dashboard typecheck

      - name: Build
        run: pnpm --filter diner-app build && pnpm --filter ops-dashboard build
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

  # ── Docker build + staging deploy (main branch only) ──────────────────────

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [lint, test-sqlite, test-postgres, frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: mesadigital:${{ github.sha }}

  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
        run: |
          echo "Deploying sha=${{ github.sha }} to staging"
          # Replace with real deploy commands, e.g.:
          # docker push $IMAGE_TAG
          # ssh deploy@$STAGING_HOST "docker pull $IMAGE_TAG && docker compose up -d"

  # ── Production deploy (tag v* only, manual approval gate) ─────────────────

  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        env:
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_SSH_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
        run: |
          echo "Deploying tag=${{ github.ref_name }} to production"
          # Replace with real deploy commands, e.g.:
          # docker push $IMAGE_TAG
          # ssh deploy@$PRODUCTION_HOST "docker pull $IMAGE_TAG && docker compose up -d"
