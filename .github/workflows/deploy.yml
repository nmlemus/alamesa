name: Deploy

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  checks:
    uses: ./.github/workflows/_checks.yml

  docker-build:
    name: Docker build
    needs: checks
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-staging:
    name: Deploy to staging
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        env:
          IMAGE: ${{ needs.docker-build.outputs.image }}
        run: |
          echo "Deploying $IMAGE to staging"
          bash scripts/deploy.sh staging "$IMAGE"

  gate-production:
    name: Await production approval
    needs: docker-build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    environment: production
    steps:
      - name: Approved
        run: echo "Production deployment of ${{ github.ref_name }} approved"

  deploy-production:
    name: Deploy to production
    needs: [docker-build, gate-production]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        env:
          IMAGE: ${{ needs.docker-build.outputs.image }}
        run: |
          echo "Deploying $IMAGE to production"
          bash scripts/deploy.sh production "$IMAGE"
